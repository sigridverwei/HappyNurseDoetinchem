<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacatures — HappyNurse Doetinchem | Zorgvacatures in de Achterhoek</title>
<meta name="description" content="Bekijk alle zorgvacatures bij HappyNurse Doetinchem. Filter op sector, regio en dienstverband. VVT, GGZ, GHZ en ziekenhuis in Doetinchem, Arnhem en omgeving.">
<link rel="stylesheet" href="css/styles.css">
<style>
.page-hero { background: var(--hn-green-50); padding-block: clamp(40px, 5vw, 64px); }
.page-hero h1 { font-size: clamp(2rem, 4.4vw, 3.2rem); }
.page-hero .lead { margin-top: 16px; max-width: 56ch; }

.vac-layout { display: grid; grid-template-columns: 288px 1fr; gap: 36px; align-items: start; }

/* Filter sidebar */
.filters {
  position: sticky; top: 96px;
  background: var(--paper); border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 24px;
}
.filters__head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.filters__head h2 { font-size: 1.12rem; }
.filters__reset { font-family:var(--font-head); font-weight:600; font-size:.82rem; color:var(--hn-green); background:none; border:none; cursor:pointer; padding:0; }
.filters__reset:hover { text-decoration: underline; }
.filter-group { padding-block: 20px; border-top: 1px solid var(--line-soft); }
.filter-group:first-of-type { border-top: none; }
.filter-group h3 { font-family:var(--font-head); font-size:.82rem; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-mute); margin-bottom:13px; }
.filter-opt { display:flex; align-items:center; gap:11px; padding:7px 0; cursor:pointer; font-size:.97rem; color:var(--ink); }
.filter-opt input { appearance:none; width:20px; height:20px; border:2px solid var(--line); border-radius:7px; cursor:pointer; flex-shrink:0; position:relative; transition: all .15s; }
.filter-opt input:checked { background:var(--hn-green); border-color:var(--hn-green); }
.filter-opt input:checked::after { content:""; position:absolute; left:6px; top:2px; width:5px; height:10px; border:solid #fff; border-width:0 2.5px 2.5px 0; transform:rotate(45deg); }
.filter-opt:hover { color: var(--hn-green-dark); }
.filter-opt .count { margin-left:auto; font-size:.84rem; color:var(--ink-mute); }

/* Search */
.searchbar { position: relative; margin-bottom: 22px; }
.searchbar svg { position:absolute; left:18px; top:50%; transform:translateY(-50%); width:20px; height:20px; color:var(--ink-mute); }
.searchbar input {
  width:100%; padding:15px 18px 15px 50px; border:1px solid var(--line); border-radius:var(--r-pill);
  font-family:var(--font-body); font-size:1rem; background:#fff; color:var(--ink);
}
.searchbar input:focus { outline:none; border-color:var(--hn-green); box-shadow:0 0 0 4px var(--hn-green-100); }

.results-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:20px; }
.results-bar .count-lbl { font-family:var(--font-head); font-weight:600; color:var(--hn-green-dark); }
.active-tags { display:flex; flex-wrap:wrap; gap:8px; }
.active-tag { display:inline-flex; align-items:center; gap:7px; font-size:.85rem; font-family:var(--font-head); font-weight:600; padding:6px 8px 6px 13px; border-radius:var(--r-pill); background:var(--hn-green-100); color:var(--hn-accent); }
.active-tag button { background:none; border:none; cursor:pointer; color:inherit; display:grid; place-items:center; width:18px; height:18px; border-radius:50%; }
.active-tag button:hover { background:rgba(0,0,0,.08); }
.active-tag svg { width:13px; height:13px; }

.vac-list { display:grid; gap:18px; }
.empty { text-align:center; padding:72px 24px; border:2px dashed var(--line); border-radius:var(--r-lg); color:var(--ink-soft); }
.empty svg { width:48px; height:48px; color:var(--hn-green-soft); margin-bottom:12px; }
.empty h3 { margin-bottom:8px; }

.mobile-filter-toggle { display:none; }

@media (max-width: 860px) {
  .vac-layout { grid-template-columns: 1fr; }
  .filters { position: static; display:none; }
  .filters.is-open { display:block; }
  .mobile-filter-toggle { display:inline-flex; }
}
</style>
</head>
<body>
<div data-header="vacatures"></div>

<section class="page-hero">
  <div class="wrap">
    <span class="kicker">Vacatures</span>
    <h1 class="mt-s">Vind jouw plek in de zorg</h1>
    <p class="lead">Alle actuele opdrachten bij HappyNurse Doetinchem — van Doetinchem en Arnhem tot Winterswijk. Filter op sector, regio en dienstverband en solliciteer in één klik.</p>
  </div>
</section>

<section class="section">
  <div class="wrap vac-layout">
    <!-- Filters -->
    <aside class="filters" id="filters">
      <div class="filters__head">
        <h2>Filteren</h2>
        <button class="filters__reset" id="resetFilters">Wis alles</button>
      </div>
      <div class="filter-group" id="fg-sector">
        <h3>Sector</h3>
      </div>
      <div class="filter-group" id="fg-regio">
        <h3>Regio</h3>
      </div>
      <div class="filter-group" id="fg-dienstverband">
        <h3>Dienstverband</h3>
      </div>
    </aside>

    <!-- Results -->
    <div>
      <div class="searchbar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="search" placeholder="Zoek op functie, bijv. verzorgende of GGZ…" autocomplete="off">
      </div>
      <div class="results-bar">
        <span class="count-lbl" id="countLbl"></span>
        <button class="btn btn--ghost btn--sm mobile-filter-toggle" id="mobileFilterToggle">Filters</button>
        <div class="active-tags" id="activeTags"></div>
      </div>
      <div class="vac-list" id="vacList"></div>
    </div>
  </div>
</section>

<div data-footer></div>

<script src="js/data.js"></script>
<script src="js/site.js"></script>
<script>
(function () {
  const state = { sectors: new Set(), regios: new Set(), dvs: new Set(), q: "" };

  // Dienstverband options derived from data
  const DV_OPTIONS = ["Flexibel loondienst", "ZZP"];

  function countBy(arr, predicate) { return arr.filter(predicate).length; }

  function buildFilterGroup(elId, options, stateSet, matchFn) {
    const el = document.getElementById(elId);
    options.forEach(opt => {
      const n = countBy(window.VACANCIES, v => matchFn(v, opt));
      const label = document.createElement("label");
      label.className = "filter-opt";
      label.innerHTML = '<input type="checkbox" value="' + opt + '"><span>' + opt + '</span><span class="count">' + n + '</span>';
      const input = label.querySelector("input");
      input.addEventListener("change", () => {
        input.checked ? stateSet.add(opt) : stateSet.delete(opt);
        render();
      });
      el.appendChild(label);
    });
  }

  buildFilterGroup("fg-sector", window.VACANCY_SECTORS, state.sectors, (v, o) => v.sector === o);
  buildFilterGroup("fg-regio", window.VACANCY_REGIONS, state.regios, (v, o) => v.regio === o);
  buildFilterGroup("fg-dienstverband", DV_OPTIONS, state.dvs, (v, o) => v.dienstverband.includes(o));

  // Search
  document.getElementById("search").addEventListener("input", e => { state.q = e.target.value.toLowerCase().trim(); render(); });

  // Reset
  document.getElementById("resetFilters").addEventListener("click", () => {
    state.sectors.clear(); state.regios.clear(); state.dvs.clear(); state.q = "";
    document.querySelectorAll(".filter-opt input").forEach(i => i.checked = false);
    document.getElementById("search").value = "";
    render();
  });

  // Mobile toggle
  document.getElementById("mobileFilterToggle").addEventListener("click", () => {
    document.getElementById("filters").classList.toggle("is-open");
  });

  function matches(v) {
    if (state.sectors.size && !state.sectors.has(v.sector)) return false;
    if (state.regios.size && !state.regios.has(v.regio)) return false;
    if (state.dvs.size && ![...state.dvs].some(d => v.dienstverband.includes(d))) return false;
    if (state.q) {
      const hay = (v.title + " " + v.sector + " " + v.locatie + " " + v.regio + " " + v.intro).toLowerCase();
      if (!hay.includes(state.q)) return false;
    }
    return true;
  }

  function renderActiveTags() {
    const tags = [];
    [...state.sectors].forEach(s => tags.push(["sector", s]));
    [...state.regios].forEach(r => tags.push(["regio", r]));
    [...state.dvs].forEach(d => tags.push(["dv", d]));
    const el = document.getElementById("activeTags");
    el.innerHTML = tags.map(([type, val]) =>
      '<span class="active-tag">' + val + '<button data-type="' + type + '" data-val="' + val + '" aria-label="Verwijder filter">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></span>'
    ).join("");
    el.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
      const { type, val } = b.dataset;
      if (type === "sector") state.sectors.delete(val);
      if (type === "regio") state.regios.delete(val);
      if (type === "dv") state.dvs.delete(val);
      document.querySelectorAll(".filter-opt input").forEach(i => { if (i.value === val) i.checked = false; });
      render();
    }));
  }

  function render() {
    const list = window.VACANCIES.filter(matches);
    const el = document.getElementById("vacList");
    document.getElementById("countLbl").textContent =
      list.length + (list.length === 1 ? " vacature gevonden" : " vacatures gevonden");
    renderActiveTags();

    if (!list.length) {
      el.innerHTML = '<div class="empty">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>' +
        '<h3>Geen vacatures gevonden</h3>' +
        '<p>Pas je filters aan of stuur een open sollicitatie — we denken graag met je mee.</p>' +
        '<a class="btn mt-s" href="solliciteren.html">Open sollicitatie</a></div>';
      return;
    }
    el.innerHTML = list.map(vacancyCardHTML).join("");
  }

  // Pre-select sector from URL (?sector=VVT)
  const params = new URLSearchParams(location.search);
  const presetSector = params.get("sector");
  if (presetSector && window.VACANCY_SECTORS.includes(presetSector)) {
    state.sectors.add(presetSector);
    const cb = document.querySelector('#fg-sector input[value="' + presetSector + '"]');
    if (cb) cb.checked = true;
  }

  render();
})();
</script>
</body>
</html>
