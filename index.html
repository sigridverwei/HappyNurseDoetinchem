<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vacaturebeheer — HappyNurse Doetinchem</title>
<meta name="robots" content="noindex">
<!-- Netlify Identity: e-mail/wachtwoord-login voor recruiters (optie B) -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Mulish:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { margin:0; font-family:'Mulish',system-ui,sans-serif; background:#E1F5EE; color:#15302A; }
  .loading-shell { min-height:100vh; display:grid; place-items:center; padding:24px; }
  .loading-card { background:#fff; border-radius:28px; padding:48px 40px; max-width:440px; text-align:center; box-shadow:0 24px 60px rgba(8,80,65,.12); }
  .mark { width:56px; height:56px; border-radius:18px; background:#1D9E75; color:#fff; display:grid; place-items:center; margin:0 auto 22px; box-shadow:0 14px 34px rgba(29,158,117,.28); }
  .mark svg { width:30px; height:30px; }
  h1 { font-family:'Poppins',sans-serif; color:#085041; font-size:1.4rem; margin:0 0 10px; }
  p { color:#4A5C56; margin:0; line-height:1.6; }
  .spinner { width:30px; height:30px; border:3px solid #C2E9DC; border-top-color:#1D9E75; border-radius:50%; margin:26px auto 0; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hint { margin-top:22px; font-size:.85rem; color:#748079; }
</style>
</head>
<body>
<!-- Decap CMS laadt hier de volledige beheeromgeving in -->
<div class="loading-shell" id="fallback">
  <div class="loading-card">
    <div class="mark"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.3 2 4.8 5.3 4.2 7.4 3.8 9.3 4.8 12 7.4c2.7-2.6 4.6-3.6 6.7-3.2C22 4.8 23.6 8.3 22 11.7 19.5 16.4 12 21 12 21Z"/></svg></div>
    <h1>Vacaturebeheer</h1>
    <p>Hier loggen recruiters van HappyNurse Doetinchem in om vacatures te plaatsen, te bewerken en offline te halen — zonder code.</p>
    <div class="spinner"></div>
    <p class="hint">Decap CMS wordt geladen… Verschijnt het inlogscherm niet, controleer dan of de site via GitHub &amp; Vercel live staat.</p>
  </div>
</div>

<!-- Decap CMS -->
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
<script>
  // Na een uitnodigingsmail belandt de recruiter op /admin met een token;
  // hieronder loggen we ze meteen door naar de CMS zodra ze inloggen.
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', user => {
      if (!user) {
        window.netlifyIdentity.on('login', () => { document.location.href = '/admin/'; });
      }
    });
  }
</script>
<script>
  // Verberg de fallback zodra Decap de UI heeft overgenomen
  if (window.CMS) {
    window.CMS.registerEventListener({
      name: 'preSave',
      handler: () => {}
    });
    setTimeout(() => {
      var fb = document.getElementById('fallback');
      if (fb && document.querySelector('#nc-root, [class*="css-"]')) fb.style.display = 'none';
    }, 1500);
  }
</script>
</body>
</html>
